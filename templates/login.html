<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade | Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --bg:       #0a0a0f;
            --surface:  #111118;
            --surface2: #18181f;
            --border:   rgba(255,255,255,0.07);
            --text:     #e8e8f0;
            --muted:    #6b6b7a;
            --accent:   #7c6aff;
            --accent-s: #5b4de0;
            --danger:   #ff4f4f;
            --success:  #3ecf8e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Canvas de fondo */
        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .header p {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .header p a {
            color: var(--accent);
            text-decoration: none;
        }
        .header p a:hover { text-decoration: underline; }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .input-group input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent);
        }

        /* El contenedor de mensajes inline requerido por el script */
        .msg {
            font-size: 14px;
            margin-bottom: 20px;
            min-height: 20px;
            display: none;
        }
        .msg.error { color: var(--danger); display: block; }
        .msg.success { color: var(--success); display: block; }

        .back-home {
            display: inline-block;
            margin-top: 24px;
            color: var(--muted);
            font-size: 13px;
            text-decoration: none;
            font-family: 'DM Mono', monospace;
        }
        .back-home:hover { color: var(--text); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="header">
                <h1>Iniciar sesión</h1>
                <p>¿No tienes cuenta? <a href="/registro">Regístrate aquí</a></p>
            </div>

            <form id="form-login">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <div id="msg" class="msg"></div>

                <button type="submit" class="btn-auth btn-submit" data-label="Entrar al arcade">
                    Entrar al arcade
                </button>
            </form>

            <a href="/" class="back-home">← Volver al inicio</a>
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <script src="{{ url_for('static', filename='js/main-effects.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth-animations.js') }}"></script>
</body>
</html>
