<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade | Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --bg:       #0a0a0f;
            --surface:  #111118;
            --surface2: #18181f;
            --border:   rgba(255,255,255,0.07);
            --border-h: rgba(255,255,255,0.14);
            --text:     #e8e8f0;
            --muted:    #6b6b7a;
            --accent:   #7c6aff;
            --accent-s: #5b4de0;
            --danger:   #ff4f4f;
            --success:  #3ecf8e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 40px 20px;
            position: relative;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .header p {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 28px;
        }
        .header p a {
            color: var(--accent);
            text-decoration: none;
        }
        .header p a:hover { text-decoration: underline; }

        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .input-group input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 11px 14px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: var(--accent); }

        /* Selector de Avatar Avanzado */
        .avatar-section {
            margin-bottom: 24px;
        }
        .avatar-section p {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        .avatar-option {
            border: 2px solid var(--border);
            background: var(--surface2);
            border-radius: 12px;
            padding: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
        }
        .avatar-option:hover {
            border-color: var(--border-h);
            transform: translateY(-2px);
        }
        .avatar-option.selected {
            border-color: var(--accent);
            background: rgba(124, 106, 255, 0.08);
        }
        .avatar-option svg {
            width: 100%;
            height: auto;
            max-width: 44px;
            display: inline-block;
        }

        .msg {
            font-size: 14px;
            margin-bottom: 18px;
            min-height: 20px;
            display: none;
        }
        .msg.error { color: var(--danger); display: block; }
        .msg.success { color: var(--success); display: block; }

        .back-home {
            display: inline-block;
            margin-top: 24px;
            color: var(--muted);
            font-size: 13px;
            text-decoration: none;
            font-family: 'DM Mono', monospace;
        }
        .back-home:hover { color: var(--text); }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="header">
                <h1>Crear cuenta</h1>
                <p>¿Ya tienes una cuenta? <a href="/login">Inicia sesión aquí</a></p>
            </div>

            <form id="form-registro">
                <div class="input-group">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password">
                </div>

                <div class="input-group">
                    <label for="password-confirm">Confirmar contraseña</label>
                    <input type="password" id="password-confirm" name="password-confirm" required autocomplete="new-password">
                </div>

                <div class="avatar-section">
                    <p>Selecciona tu avatar</p>
                    <div class="avatar-grid">
                        <div class="avatar-option selected" onclick="selectAvatar(this, 'michi1')">
                            <svg viewBox="0 0 36 36"><circle fill="#FFD983" cx="18" cy="18" r="18"/><path fill="#E6A633" d="M18 25c-3.3 0-6-2.7-6-6h12c0 3.3-2.7 6-6 6z"/><circle fill="#273B4A" cx="12" cy="14" r="2.5"/><circle fill="#273B4A" cx="24" cy="14" r="2.5"/><path fill="#E6A633" d="M7 6l5 5H4zM29 6l-5 5h8z"/></svg>
                        </div>
                        <div class="avatar-option" onclick="selectAvatar(this, 'michi2')">
                            <svg viewBox="0 0 36 36"><circle fill="#FFAC83" cx="18" cy="18" r="18"/><path fill="#DE6B32" d="M18 25c-3.3 0-6-2.7-6-6h12c0 3.3-2.7 6-6 6z"/><circle fill="#273B4A" cx="12" cy="14" r="2.5"/><circle fill="#273B4A" cx="24" cy="14" r="2.5"/><path fill="#DE6B32" d="M6 7l4 4H3zM30 7l-4 4h7z"/></svg>
                        </div>
                        <div class="avatar-option" onclick="selectAvatar(this, 'michi3')">
                            <svg viewBox="0 0 36 36"><circle fill="#CCD6DD" cx="18" cy="18" r="18"/><path fill="#99AAB5" d="M18 25c-3.3 0-6-2.7-6-6h12c0 3.3-2.7 6-6 6z"/><circle fill="#273B4A" cx="12" cy="14" r="2.5"/><circle fill="#273B4A" cx="24" cy="14" r="2.5"/><path fill="#99AAB5" d="M6 7l4 4H3zM30 7l-4 4h7z"/></svg>
                        </div>
                        <div class="avatar-option" onclick="selectAvatar(this, 'michi4')">
                            <svg viewBox="0 0 36 36"><circle fill="#A4D4AE" cx="18" cy="18" r="18"/><path fill="#68A675" d="M18 25c-3.3 0-6-2.7-6-6h12c0 3.3-2.7 6-6 6z"/><circle fill="#273B4A" cx="12" cy="14" r="2.5"/><circle fill="#273B4A" cx="24" cy="14" r="2.5"/><path fill="#68A675" d="M6 7l4 4H3zM30 7l-4 4h7z"/></svg>
                        </div>
                    </div>
                    <input type="hidden" id="avatar-input" name="avatar" value="michi1">
                </div>

                <div id="msg" class="msg"></div>

                <button type="submit" class="btn-auth btn-submit" data-label="Crear cuenta">
                    Crear cuenta
                </button>
            </form>

            <a href="/" class="back-home">← Volver al inicio</a>
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <script>
        function selectAvatar(element, avatarName) {
            document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('avatar-input').value = avatarName;
        }
    </script>

    <script src="{{ url_for('static', filename='js/main-effects.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth-animations.js') }}"></script>
</body>
</html>
