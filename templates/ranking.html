<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade | Top Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .rank-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 2.5rem 2rem 4rem;
        }

        .rank-page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .rank-page-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .rank-page-header h1 span { color: var(--accent); }

        .btn-back-rank {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 18px;
            background: var(--bg-raised);
            border: 1px solid var(--border-md);
            border-radius: 40px;
            color: var(--text-2);
            font-size: 0.875rem;
            font-weight: 500;
            font-family: var(--font-body);
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-back-rank:hover {
            border-color: var(--border-hi);
            color: var(--text);
        }

        /* Tabs */
        .rank-tabs-global {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .rtab {
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: var(--font-body);
            background: var(--bg-raised);
            border: 1px solid var(--border-md);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.15s;
        }
        .rtab:hover { border-color: var(--border-hi); color: var(--text); }
        .rtab.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* Panel */
        .rpanel { display: none; }
        .rpanel.active { display: block; }

        /* Podio */
        .podium-global {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 16px;
            height: 200px;
            margin-bottom: 2rem;
        }

        .pod-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
        }

        .pod-col-name {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 4px;
            text-align: center;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pod-col-pts {
            font-size: 0.7rem;
            color: var(--muted);
            font-family: var(--font-mono);
            margin-bottom: 6px;
        }

        .pod-col-bar {
            width: 90px;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            color: #0a0a14;
        }

        .pod-col.first .pod-col-bar  { height: 140px; background: var(--gold);   box-shadow: 0 -4px 24px rgba(232,185,74,0.3); }
        .pod-col.second .pod-col-bar { height: 100px; background: var(--silver); }
        .pod-col.third .pod-col-bar  { height: 68px;  background: var(--bronze); }

        /* Tabla */
        .rank-table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }

        .rank-table-wrap table {
            width: 100%;
            border-collapse: collapse;
        }

        .rank-table-wrap th {
            text-align: left;
            padding: 14px 20px;
            font-size: 0.72rem;
            font-family: var(--font-mono);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            background: var(--bg-raised);
        }

        .rank-table-wrap td {
            padding: 13px 20px;
            font-size: 0.9rem;
            color: var(--text-2);
            border-bottom: 1px solid var(--border);
        }

        .rank-table-wrap tr:last-child td { border-bottom: none; }
        .rank-table-wrap tr:hover td { background: var(--bg-hover); }

        .pos-cell {
            font-family: var(--font-mono);
            font-size: 0.82rem;
            width: 52px;
            color: var(--muted);
        }
        .pos-cell.g { color: var(--gold);   font-weight: 700; }
        .pos-cell.s { color: var(--silver); font-weight: 700; }
        .pos-cell.b { color: var(--bronze); font-weight: 700; }

        .name-cell { color: var(--text); font-weight: 500; }
        .pts-cell  {
            font-family: var(--font-mono);
            font-weight: 500;
            color: var(--accent);
        }

        .empty-row td {
            text-align: center;
            padding: 3rem;
            color: var(--muted);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .rank-page { padding: 1.5rem 1rem 3rem; }
            .podium-global { height: 160px; gap: 10px; }
            .pod-col { min-width: 85px; }
            .pod-col.first .pod-col-bar  { height: 110px; }
            .pod-col.second .pod-col-bar { height: 80px;  }
            .pod-col.third .pod-col-bar  { height: 55px;  }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="/" class="logo">
            <img src="{{ url_for('static', filename='img/favicon.gif') }}" class="nav-gif" alt="">
            Arc<span>ade</span>
        </a>
        <ul class="nav-links">
            <li><a href="/">Inicio</a></li>
            <li><a href="/dashboard">Mi panel</a></li>
        </ul>
        <div id="nav-session-rank"></div>
    </nav>

    <div class="rank-page">

        <div class="rank-page-header">
            <div>
                <h1>Top <span>Global</span></h1>
                <p style="color:var(--muted); font-size:0.875rem; margin-top:4px;">Todos los jugadores · Todos los juegos</p>
            </div>
            <a href="/" class="btn-back-rank">← Volver al menú</a>
        </div>

        <!-- Tabs -->
        <div class="rank-tabs-global">
            <button class="rtab active" onclick="cambiarTab('snake', this)"> Snake</button>
            <button class="rtab" onclick="cambiarTab('trivia', this)"> Trivia</button>
            <button class="rtab" onclick="cambiarTab('clicker', this)"> Clicker</button>
            <button class="rtab" onclick="cambiarTab('simon', this)"> Simón</button>
        </div>

        <!-- Snake -->
        <div class="rpanel active" id="rp-snake">
            <div class="podium-global" id="pod-snake"></div>
            <div class="rank-table-wrap">
                <table>
                    <thead><tr>
                        <th style="width:52px">#</th>
                        <th>Jugador</th>
                        <th>Puntos</th>
                    </tr></thead>
                    <tbody id="tb-snake"></tbody>
                </table>
            </div>
        </div>

        <!-- Trivia -->
        <div class="rpanel" id="rp-trivia">
            <div class="podium-global" id="pod-trivia"></div>
            <div class="rank-table-wrap">
                <table>
                    <thead><tr>
                        <th style="width:52px">#</th>
                        <th>Jugador</th>
                        <th>Puntos</th>
                    </tr></thead>
                    <tbody id="tb-trivia"></tbody>
                </table>
            </div>
        </div>

        <!-- Clicker -->
        <div class="rpanel" id="rp-clicker">
            <div class="podium-global" id="pod-clicker"></div>
            <div class="rank-table-wrap">
                <table>
                    <thead><tr>
                        <th style="width:52px">#</th>
                        <th>Jugador</th>
                        <th>Puntos</th>
                    </tr></thead>
                    <tbody id="tb-clicker"></tbody>
                </table>
            </div>
        </div>

        <!-- Simón -->
        <div class="rpanel" id="rp-simon">
            <div class="podium-global" id="pod-simon"></div>
            <div class="rank-table-wrap">
                <table>
                    <thead><tr>
                        <th style="width:52px">#</th>
                        <th>Jugador</th>
                        <th>Puntos</th>
                    </tr></thead>
                    <tbody id="tb-simon"></tbody>
                </table>
            </div>
        </div>

    </div><!-- /.rank-page -->

    <footer class="footer">&copy; 2026 ArcadeGames — Proyecto Escolar</footer>

    <script>
    // ── Tabs ────────────────────────────────────────
    function cambiarTab(juego, btn) {
        document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.rpanel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('rp-' + juego).classList.add('active');
    }

    // ── Render ──────────────────────────────────────
    function renderTabla(juego, lista) {
        const tbody = document.getElementById('tb-' + juego);
        if (!tbody) return;
        if (!lista.length) {
            tbody.innerHTML = `<tr class="empty-row"><td colspan="3">Aún no hay récords para este juego</td></tr>`;
            return;
        }
        const posClass = ['g','s','b'];
        const posEmoji = ['🥇','🥈','🥉'];
        tbody.innerHTML = lista.map((r, i) => `
            <tr>
                <td class="pos-cell ${posClass[i] || ''}">${i < 3 ? posEmoji[i] : i + 1}</td>
                <td class="name-cell">${r.nombre || 'Anónimo'}</td>
                <td class="pts-cell">${r.puntos}</td>
            </tr>
        `).join('');
    }

    function renderPodio(juego, lista) {
        const wrap = document.getElementById('pod-' + juego);
        if (!wrap) return;
        const p = [0,1,2].map(i => lista[i] || { nombre: 'Vacante', puntos: '—' });
        wrap.innerHTML = `
            <div class="pod-col second">
                <div class="pod-col-name">${p[1].nombre}</div>
                <div class="pod-col-pts">${p[1].puntos} pts</div>
                <div class="pod-col-bar">2°</div>
            </div>
            <div class="pod-col first">
                <div class="pod-col-name">${p[0].nombre}</div>
                <div class="pod-col-pts">${p[0].puntos} pts</div>
                <div class="pod-col-bar">1°</div>
            </div>
            <div class="pod-col third">
                <div class="pod-col-name">${p[2].nombre}</div>
                <div class="pod-col-pts">${p[2].puntos} pts</div>
                <div class="pod-col-bar">3°</div>
            </div>
        `;
    }

    // ── Cargar datos ────────────────────────────────
    async function cargarRankings() {
        try {
            const res  = await fetch('/obtener_ranking');
            const data = await res.json();
            ['snake','trivia','clicker','simon'].forEach(j => {
                const lista = data.ranking
                    .filter(r => r.juego && r.juego.toLowerCase() === j)
                    .sort((a,b) => b.puntos - a.puntos);
                renderTabla(j, lista);
                renderPodio(j, lista);
            });
        } catch(e) {
            console.error('Error cargando ranking:', e);
        }
    }

    // ── Navbar sesión ───────────────────────────────
    (function() {
        const zona = document.getElementById('nav-session-rank');
        fetch('/api/sesion')
            .then(r => r.json())
            .then(data => {
                if (data.loggedin) {
                    const av = data.avatar
                        ? `<img src="${data.avatar}" alt="av" style="width:100%;height:100%;object-fit:cover;">`
                        : data.username.charAt(0).toUpperCase();
                    zona.innerHTML = `
                        <div style="display:flex;align-items:center;gap:8px;">
                            <a href="/dashboard" class="btn-login-nav" style="font-size:0.82rem;padding:7px 14px;">Mi panel</a>
                            <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7c6aff);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:white;overflow:hidden;">${av}</div>
                        </div>`;
                } else {
                    zona.innerHTML = `<a href="/login" class="btn-login-nav">Iniciar sesión</a>`;
                }
            })
            .catch(() => { zona.innerHTML = `<a href="/login" class="btn-login-nav">Iniciar sesión</a>`; });
    })();

    window.onload = cargarRankings;
    </script>

</body>
</html>
