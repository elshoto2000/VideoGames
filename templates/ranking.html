<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade | Top Global</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* ── Variables locales para compatibilidad ── */
        :root {
            --font-display: 'Syne', sans-serif;
            --font-sans:    'DM Sans', sans-serif;
            --font-mono:    'DM Mono', monospace;
            --bg-card:      #0f0f1a;
            --bg-raised:    #14141f;
            --bg-hover:     #1a1a28;
            --border:       rgba(255,255,255,0.06);
            --border-md:    rgba(255,255,255,0.10);
            --text:         #eeeef5;
            --text-2:       #a8a8be;
            --text-muted:   #5a5a78;
            --accent:       #4f7cff;
            --accent-glow:  rgba(79,124,255,0.18);
            --gold:         #e8b94a;
            --silver:       #9eaabd;
            --bronze:       #c47f4a;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--font-sans);
            background: #080810;
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Navbar ── */
        .main-header {
            border-bottom: 1px solid var(--border);
            background: rgba(8,8,16,0.85);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .main-header-inner {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-link {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .logo-link em { font-style: normal; color: var(--accent); }

        .btn-nav {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 16px;
            background: var(--accent);
            color: white;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: var(--font-sans);
            text-decoration: none;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-nav:hover { background: #3a63e0; }

        .btn-nav-ghost {
            display: inline-flex;
            align-items: center;
            padding: 7px 16px;
            background: var(--bg-raised);
            color: var(--text-2);
            font-size: 0.82rem;
            font-weight: 500;
            font-family: var(--font-sans);
            text-decoration: none;
            border-radius: 40px;
            border: 1px solid var(--border-md);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-nav-ghost:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }

        .nav-avatar-mini {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #7c6aff);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700;
            color: white; overflow: hidden; flex-shrink: 0;
        }

        .nav-avatar-mini img { width:100%; height:100%; object-fit:cover; }

        /* ── Página ── */
        .rank-page {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem 5rem;
        }

        .rank-page-header {
            margin-bottom: 2.5rem;
        }

        .rank-page-header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text);
            margin-bottom: 4px;
        }

        .rank-page-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ── Tabs ── */
        .rank-tabs-global {
            display: flex;
            gap: 6px;
            background: rgba(255,255,255,0.02);
            padding: 5px;
            border-radius: 14px;
            border: 1px solid var(--border);
            margin-bottom: 2.5rem;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .rank-tabs-global::-webkit-scrollbar { display: none; }

        .rtab {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 9px 18px;
            font-family: var(--font-sans);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.15s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .rtab:hover { color: var(--text); background: rgba(255,255,255,0.03); }

        .rtab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        /* ── Panels ── */
        .rpanel { display: none; }
        .rpanel.active {
            display: block;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Podio ── */
        .podium-global {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 16px;
            margin-bottom: 2.5rem;
            padding-top: 2.5rem;
            min-height: 220px;
        }

        .podium-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 130px;
        }

        .pod-crown {
            font-size: 1.5rem;
            margin-bottom: 4px;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pod-avatar {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: var(--bg-raised);
            border: 2px solid var(--border-md);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.3rem;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: var(--shadow-md, 0 6px 24px rgba(0,0,0,0.5));
        }

        .pod-avatar img { width:100%; height:100%; object-fit:cover; }

        .podium-step.p1 .pod-avatar { border-color: var(--gold);   width:70px; height:70px; }
        .podium-step.p2 .pod-avatar { border-color: var(--silver); }
        .podium-step.p3 .pod-avatar { border-color: var(--bronze); }

        .pod-pillar {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px 8px 10px;
            gap: 3px;
        }

        .podium-step.p1 .pod-pillar { height: 120px; border-color: rgba(232,185,74,0.25); background: linear-gradient(180deg, rgba(232,185,74,0.06), var(--bg-card)); }
        .podium-step.p2 .pod-pillar { height: 88px;  border-color: rgba(158,170,189,0.2); }
        .podium-step.p3 .pod-pillar { height: 65px;  border-color: rgba(196,127,74,0.2); }

        .pod-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text);
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            text-align: center;
        }

        .pod-pts {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: var(--accent);
            font-weight: 500;
        }

        .pod-rank-num {
            font-size: 1.6rem;
            font-weight: 800;
            font-family: var(--font-display);
            opacity: 0.08;
            color: white;
            margin-top: auto;
        }

        /* ── Tabla ── */
        .rank-table-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .rtable {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        .rtable thead th {
            background: rgba(255,255,255,0.015);
            padding: 13px 20px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            border-bottom: 1px solid var(--border);
            font-family: var(--font-mono);
        }

        .rtable tbody td {
            padding: 13px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: var(--text-2);
        }

        .rtable tbody tr:last-child td { border-bottom: none; }
        .rtable tbody tr:hover td { background: rgba(255,255,255,0.015); }

        .td-pos {
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--text-muted);
            width: 56px;
            font-size: 0.82rem;
        }

        .td-user {
            display: flex;
            align-items: center;
            gap: 11px;
            font-weight: 600;
            color: var(--text);
        }

        .td-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #7c6aff);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700;
            color: white; overflow: hidden; flex-shrink: 0;
        }

        .td-avatar img { width:100%; height:100%; object-fit:cover; }

        .td-pts {
            text-align: right;
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--accent);
        }

        /* ── Estado vacío ── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .empty-state p { font-size: 0.9rem; line-height: 1.6; }

        /* ── Loading ── */
        .loading-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-family: var(--font-mono);
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .spinner-inline {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-family: var(--font-mono);
            border-top: 1px solid var(--border);
        }

        @media (max-width: 600px) {
            .rank-page { padding: 1.5rem 1rem 3rem; }
            .podium-global { gap: 10px; padding-top: 1.5rem; }
            .podium-step { width: 100px; }
            .podium-step.p1 .pod-pillar { height: 95px; }
            .podium-step.p2 .pod-pillar { height: 70px; }
            .podium-step.p3 .pod-pillar { height: 52px; }
            .pod-avatar { width: 50px; height: 50px; font-size: 1.1rem; }
            .podium-step.p1 .pod-avatar { width: 58px; height: 58px; }
            .rtable thead { display: none; }
            .rtable tbody td { padding: 11px 14px; font-size: 0.85rem; }
            .td-pos { width: 40px; }
        }
    </style>
</head>
<body>

    <!-- ── Navbar ─────────────────────────────────────────── -->
    <header class="main-header">
        <div class="main-header-inner">
            <a href="/" class="logo-link">Arc<em>ade</em></a>
            <div id="nav-session-rank" style="display:flex; align-items:center; gap:8px;"></div>
        </div>
    </header>

    <!-- ── Contenido ──────────────────────────────────────── -->
    <main class="rank-page">
        <div class="rank-page-header">
            <h1>Salón de la Fama</h1>
            <p>Los mejores puntajes de toda la plataforma.</p>
        </div>

        <!-- Tabs -->
        <div class="rank-tabs-global">
            <button class="rtab active" onclick="cambiarTab('snake',   this)">🐍 Snake</button>
            <button class="rtab"        onclick="cambiarTab('trivia',  this)">🧠 Trivia</button>
            <button class="rtab"        onclick="cambiarTab('clicker', this)">⚡ Clicker</button>
            <button class="rtab"        onclick="cambiarTab('simon',   this)">🔴 Simón</button>
            <button class="rtab"        onclick="cambiarTab('geo',     this)">📐 Geo Dash</button>
        </div>

        <!-- Panels -->
        <div class="rpanel active" id="rp-snake">
            <div class="podium-global" id="pod-snake">
                <div class="loading-state"><span class="spinner-inline"></span> Cargando…</div>
            </div>
            <div class="rank-table-wrap" id="wrap-snake" style="display:none;">
                <table class="rtable" id="tb-snake"></table>
            </div>
        </div>

        <div class="rpanel" id="rp-trivia">
            <div class="podium-global" id="pod-trivia">
                <div class="loading-state"><span class="spinner-inline"></span> Cargando…</div>
            </div>
            <div class="rank-table-wrap" id="wrap-trivia" style="display:none;">
                <table class="rtable" id="tb-trivia"></table>
            </div>
        </div>

        <div class="rpanel" id="rp-clicker">
            <div class="podium-global" id="pod-clicker">
                <div class="loading-state"><span class="spinner-inline"></span> Cargando…</div>
            </div>
            <div class="rank-table-wrap" id="wrap-clicker" style="display:none;">
                <table class="rtable" id="tb-clicker"></table>
            </div>
        </div>

        <div class="rpanel" id="rp-simon">
            <div class="podium-global" id="pod-simon">
                <div class="loading-state"><span class="spinner-inline"></span> Cargando…</div>
            </div>
            <div class="rank-table-wrap" id="wrap-simon" style="display:none;">
                <table class="rtable" id="tb-simon"></table>
            </div>
        </div>

        <div class="rpanel" id="rp-geo">
            <div class="podium-global" id="pod-geo">
                <div class="loading-state"><span class="spinner-inline"></span> Cargando…</div>
            </div>
            <div class="rank-table-wrap" id="wrap-geo" style="display:none;">
                <table class="rtable" id="tb-geo"></table>
            </div>
        </div>
    </main>

    <footer>&copy; 2026 ArcadeGames — Proyecto Escolar</footer>

    <script>
    /* ── Tabs ─────────────────────────────────────────── */
    function cambiarTab(juego, btn) {
        document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.rpanel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        const panel = document.getElementById('rp-' + juego);
        if (panel) panel.classList.add('active');
    }

    /* ── Render podio ─────────────────────────────────── */
    function renderPodio(juego, lista) {
        const el = document.getElementById('pod-' + juego);
        if (!el) return;

        if (!lista || lista.length === 0) {
            el.innerHTML = `
                <div class="empty-state" style="width:100%;">
                    <div class="empty-icon">👾</div>
                    <p>Nadie ha jugado aún.<br>¡Sé el primero en marcar un récord!</p>
                </div>`;
            return;
        }

        // Orden visual del podio: 2°, 1°, 3°
        const slots = [
            { data: lista[1], cls: 'p2', crown: '🥈', h: 88  },
            { data: lista[0], cls: 'p1', crown: '👑',  h: 120 },
            { data: lista[2], cls: 'p3', crown: '🥉', h: 65  },
        ];

        el.innerHTML = slots.map(s => {
            if (!s.data) return '<div style="width:130px;"></div>';
            const av = s.data.avatar
                ? `<img src="${s.data.avatar}" alt="">`
                : s.data.nombre.charAt(0).toUpperCase();
            return `
                <div class="podium-step ${s.cls}">
                    <div class="pod-crown">${s.cls === 'p1' ? '👑' : ''}</div>
                    <div class="pod-avatar">${av}</div>
                    <div class="pod-pillar">
                        <div class="pod-name">${esc(s.data.nombre)}</div>
                        <div class="pod-pts">${s.data.puntos} pts</div>
                        <div class="pod-rank-num">${s.cls === 'p1' ? '1' : s.cls === 'p2' ? '2' : '3'}</div>
                    </div>
                </div>`;
        }).join('');
    }

    /* ── Render tabla (posiciones 4+) ─────────────────── */
    function renderTabla(juego, lista) {
        const wrap  = document.getElementById('wrap-' + juego);
        const tabla = document.getElementById('tb-' + juego);
        if (!wrap || !tabla) return;

        const resto = lista.slice(3);
        if (resto.length === 0) { wrap.style.display = 'none'; return; }

        wrap.style.display = 'block';
        tabla.innerHTML = `
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Jugador</th>
                    <th style="text-align:right;">Puntaje</th>
                </tr>
            </thead>
            <tbody>
                ${resto.map((u, i) => {
                    const av = u.avatar
                        ? `<img src="${u.avatar}" alt="">`
                        : u.nombre.charAt(0).toUpperCase();
                    return `
                        <tr>
                            <td class="td-pos">#${i + 4}</td>
                            <td>
                                <div class="td-user">
                                    <div class="td-avatar">${av}</div>
                                    <span>${esc(u.nombre)}</span>
                                </div>
                            </td>
                            <td class="td-pts">${u.puntos}</td>
                        </tr>`;
                }).join('')}
            </tbody>`;
    }

    /* ── Cargar rankings ──────────────────────────────── */
    async function cargarRankings() {
        try {
            // ✅ RUTA CORRECTA — coincide con app.py
            const res  = await fetch('/obtener_ranking');
            const data = await res.json();
            const todo = data.ranking || [];

            const JUEGOS = ['snake', 'trivia', 'clicker', 'simon', 'geo'];
            JUEGOS.forEach(j => {
                // Normalización robusta: elimina acentos y compara en minúsculas
                const lista = todo
                    .filter(r => {
                        if (!r.juego) return false;
                        return normalizar(r.juego) === normalizar(j);
                    })
                    .sort((a, b) => b.puntos - a.puntos);

                renderPodio(j, lista);
                renderTabla(j, lista);
            });
        } catch (e) {
            console.error('Error cargando ranking:', e);
            ['snake','trivia','clicker','simon','geo'].forEach(j => {
                const el = document.getElementById('pod-' + j);
                if (el) el.innerHTML = `<div class="empty-state" style="width:100%;"><div class="empty-icon">⚠️</div><p>Error al cargar datos.<br>Recarga la página.</p></div>`;
            });
        }
    }

    /* ── Helpers ──────────────────────────────────────── */
    function normalizar(str) {
        return str.toLowerCase()
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .trim();
    }

    function esc(str) {
        return String(str)
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;');
    }

    /* ── Navbar sesión ────────────────────────────────── */
    (function() {
        const zona = document.getElementById('nav-session-rank');
        fetch('/api/sesion')
            .then(r => r.json())
            .then(d => {
                if (d.loggedin) {
                    const av = d.avatar
                        ? `<img src="${d.avatar}" alt="" style="width:100%;height:100%;object-fit:cover;">`
                        : d.username.charAt(0).toUpperCase();
                    zona.innerHTML = `
                        <a href="/dashboard" class="btn-nav">Mi panel</a>
                        <div class="nav-avatar-mini">${av}</div>`;
                } else {
                    zona.innerHTML = `<a href="/login" class="btn-nav">Iniciar sesión</a>`;
                }
            })
            .catch(() => {
                zona.innerHTML = `<a href="/login" class="btn-nav">Iniciar sesión</a>`;
            });
    })();

    /* ── Init ─────────────────────────────────────────── */
    cargarRankings();
    </script>
</body>
</html>
