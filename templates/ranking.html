<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Global - Arcade</title>
    <!-- Usamos url_for para que Flask cargue bien tu CSS principal -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --dark-bg: #0d0221;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Trebuchet MS', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .main-title {
            text-align: center;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        /* Contenedor de cada juego */
        .game-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 50px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
        }

        .game-header {
            width: 100%;
            color: var(--neon-cyan);
            border-bottom: 2px solid var(--neon-cyan);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* TABLA CON SCROLL */
        .ranking-table-container {
            flex: 1;
            min-width: 300px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            position: sticky;
            top: 0;
            background: #1a0b3d; /* Un tono un poco más claro para el header */
            color: var(--neon-cyan);
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Barra de scroll personalizada */
        .ranking-table-container::-webkit-scrollbar { width: 6px; }
        .ranking-table-container::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
        }

        /* PODIO */
        .podium-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 320px;
        }

        .podium-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 10px;
            width: 100px;
            text-align: center;
        }

        .step {
            width: 100%;
            background: linear-gradient(to top, rgba(0, 240, 255, 0.2), var(--neon-cyan));
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.8rem;
            color: #0d0221;
        }

        .first .step { height: 180px; box-shadow: 0 0 30px var(--neon-cyan); }
        .second .step { height: 130px; opacity: 0.8; }
        .third .step { height: 90px; opacity: 0.6; }

        .player-name {
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 25px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: var(--neon-cyan);
            color: #0d0221;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        @media (max-width: 768px) {
            .game-section { flex-direction: column; align-items: center; }
            .podium-container { order: -1; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <a href="/" class="btn-back">← VOLVER AL MENÚ</a>
    <h1 class="main-title">TOP GLOBAL DE JUGADORES</h1>

    <div class="rankings-wrapper">
        
        <!-- SECCIÓN SNAKE -->
        <section class="game-section">
            <h2 class="game-header">SNAKE CHALLENGE</h2>
            <div class="ranking-table-container">
                <table>
                    <thead>
                        <tr><th>Puesto</th><th>Jugador</th><th>Puntos</th></tr>
                    </thead>
                    <tbody id="body-snake"></tbody>
                </table>
            </div>
            <div class="podium-container" id="podium-snake"></div>
        </section>

        <!-- SECCIÓN CLICKER -->
        <section class="game-section">
            <h2 class="game-header">FAST CLICKER</h2>
            <div class="ranking-table-container">
                <table>
                    <thead>
                        <tr><th>Puesto</th><th>Jugador</th><th>Puntos</th></tr>
                    </thead>
                    <tbody id="body-clicker"></tbody>
                </table>
            </div>
            <div class="podium-container" id="podium-clicker"></div>
        </section>

        <!-- SECCIÓN TRIVIA -->
        <section class="game-section">
            <h2 class="game-header">TRIVIA EXPERT</h2>
            <div class="ranking-table-container">
                <table>
                    <thead>
                        <tr><th>Puesto</th><th>Jugador</th><th>Puntos</th></tr>
                    </thead>
                    <tbody id="body-trivia"></tbody>
                </table>
            </div>
            <div class="podium-container" id="podium-trivia"></div>
        </section>

    </div>

    <script>
        async function cargarRankings() {
            try {
                const response = await fetch('/obtener_ranking');
                const data = await response.json();
                
                const juegos = ['snake', 'clicker', 'trivia'];
                
                juegos.forEach(juego => {
                    const filtrados = data.ranking
                        .filter(r => r.juego.toLowerCase() === juego)
                        .sort((a, b) => b.puntos - a.puntos);
                    
                    llenarTabla(juego, filtrados);
                    llenarPodio(juego, filtrados);
                });
            } catch (err) {
                console.error("Error cargando ranking:", err);
            }
        }

        function llenarTabla(juego, lista) {
            const tbody = document.getElementById(`body-${juego}`);
            if (!tbody) return;
            
            tbody.innerHTML = lista.map((r, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${r.nombre}</td>
                    <td><b style="color: var(--neon-cyan)">${r.puntos}</b></td>
                </tr>
            `).join('') || '<tr><td colspan="3" style="text-align:center">Aún no hay récords</td></tr>';
        }

        function llenarPodio(juego, lista) {
            const container = document.getElementById(`podium-${juego}`);
            if (!container) return;

            const p1 = lista[0] || { nombre: "---", puntos: 0 };
            const p2 = lista[1] || { nombre: "---", puntos: 0 };
            const p3 = lista[2] || { nombre: "---", puntos: 0 };

            container.innerHTML = `
                <div class="podium-step second">
                    <div class="player-name">${p2.nombre}<br>(${p2.puntos})</div>
                    <div class="step">2°</div>
                </div>
                <div class="podium-step first">
                    <div class="player-name">${p1.nombre}<br>(${p1.puntos})</div>
                    <div class="step">1°</div>
                </div>
                <div class="podium-step third">
                    <div class="player-name">${p3.nombre}<br>(${p3.puntos})</div>
                    <div class="step">3°</div>
                </div>
            `;
        }

        window.onload = cargarRankings;
    </script>
</body>
</html>
