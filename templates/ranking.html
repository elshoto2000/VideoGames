<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Global - Guayaquil Tech</title>
    <link rel="stylesheet" href="style.css"> <!-- Reutiliza tus estilos base -->
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --dark-bg: #0d0221;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .main-title {
            text-align: center;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan);
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        /* Contenedor de cada juego */
        .game-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 80px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        .game-header {
            width: 100%;
            color: var(--neon-cyan);
            border-bottom: 2px solid var(--neon-cyan);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* LADO IZQUIERDO: La Tabla con Scroll */
        .ranking-table-container {
            flex: 1;
            min-width: 300px;
            max-height: 450px;
            overflow-y: auto; /* Aquí la barrita lateral */
            padding-right: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            position: sticky;
            top: 0;
            background: var(--dark-bg);
            color: var(--neon-cyan);
            padding: 10px;
            text-align: left;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Estilo de la barrita lateral (Scrollbar) */
        .ranking-table-container::-webkit-scrollbar {
            width: 8px;
        }
        .ranking-table-container::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* LADO DERECHO: El Podio Visual */
        .podium-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 300px;
            padding-bottom: 20px;
        }

        .podium-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 10px;
            width: 100px;
            text-align: center;
        }

        .step {
            width: 100%;
            background: linear-gradient(to top, #00f0ff44, #00f0ff);
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 2rem;
            color: var(--dark-bg);
        }

        .first .step { height: 180px; box-shadow: 0 0 30px var(--neon-cyan); }
        .second .step { height: 130px; opacity: 0.8; }
        .third .step { height: 90px; opacity: 0.6; }

        .player-name {
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            word-wrap: break-word;
            max-width: 100px;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-back:hover {
            background: var(--neon-cyan);
            color: var(--dark-bg);
        }

    </style>
</head>
<body>

    <a href="index.html" class="btn-back">← VOLVER AL MENÚ</a>
    <h1 class="main-title">TOP GLOBAL DE JUGADORES</h1>

    <div id="rankings-wrapper">
        <!-- SECCIÓN SNAKE -->
        <section class="game-section">
            <h2 class="game-header">SNAKE CHALLENGE</h2>
            <div class="ranking-table-container">
                <table>
                    <thead>
                        <tr><th>Puesto</th><th>Jugador</th><th>Puntos</th></tr>
                    </thead>
                    <tbody id="body-snake">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
            <div class="podium-container" id="podium-snake">
                <!-- Se llena con JS -->
            </div>
        </section>

        <!-- SECCIÓN CLICKER -->
        <section class="game-section">
            <h2 class="game-header">FAST CLICKER</h2>
            <div class="ranking-table-container">
                <table>
                    <thead>
                        <tr><th>Puesto</th><th>Jugador</th><th>Puntos</th></tr>
                    </thead>
                    <tbody id="body-clicker">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
            <div class="podium-container" id="podium-clicker">
                <!-- Se llena con JS -->
            </div>
        </section>

        <!-- SECCIÓN TRIVIA -->
        <section class="game-section">
            <h2 class="game-header">TRIVIA EXPERT</h2>
            <div class="ranking-table-container">
                <table>
                    <thead>
                        <tr><th>Puesto</th><th>Jugador</th><th>Puntos</th></tr>
                    </thead>
                    <tbody id="body-trivia">
                        <!-- Se llena con JS -->
                    </tbody>
                </table>
            </div>
            <div class="podium-container" id="podium-trivia">
                <!-- Se llena con JS -->
            </div>
        </section>
    </div>

    <script>
        async function cargarRankings() {
            try {
                const response = await fetch('/obtener_ranking');
                const data = await response.json();
                
                const juegos = ['snake', 'clicker', 'trivia'];
                
                juegos.forEach(juego => {
                    const filtrados = data.ranking
                        .filter(r => r.juego.toLowerCase() === juego)
                        .sort((a, b) => b.puntos - a.puntos);
                    
                    llenarTabla(juego, filtrados);
                    llenarPodio(juego, filtrados);
                });
            } catch (err) {
                console.error("Error cargando ranking:", err);
            }
        }

        function llenarTabla(juego, lista) {
            const tbody = document.getElementById(`body-${juego}`);
            tbody.innerHTML = lista.map((r, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td>${r.nombre}</td>
                    <td><b>${r.puntos}</b></td>
                </tr>
            `).join('');
        }

        function llenarPodio(juego, lista) {
            const container = document.getElementById(`podium-${juego}`);
            const p1 = lista[0] || { nombre: "---", puntos: 0 };
            const p2 = lista[1] || { nombre: "---", puntos: 0 };
            const p3 = lista[2] || { nombre: "---", puntos: 0 };

            container.innerHTML = `
                <div class="podium-step second">
                    <div class="player-name">${p2.nombre}<br>(${p2.puntos})</div>
                    <div class="step">2°</div>
                </div>
                <div class="podium-step first">
                    <div class="player-name">${p1.nombre}<br>(${p1.puntos})</div>
                    <div class="step">1°</div>
                </div>
                <div class="podium-step third">
                    <div class="player-name">${p3.nombre}<br>(${p3.puntos})</div>
                    <div class="step">3°</div>
                </div>
            `;
        }

        window.onload = cargarRankings;
    </script>
</body>
</html>
